<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Label Generator - Michael's Nursery Pricing Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50:'#f0fdf4', 100:'#dcfce7', 200:'#bbf7d0', 500:'#22c55e', 600:'#16a34a', 700:'#15803d', 800:'#166534' }
          }
        }
      }
    }
  </script>
  <style>
    [x-cloak] { display: none !important; }
    .fade-in { animation: fadeIn 0.2s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .spinner { border: 3px solid #e5e7eb; border-top-color: #22c55e; border-radius: 50%; width: 20px; height: 20px; animation: spin 0.6s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .label-card {
      border: 1px dashed #d1d5db;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      overflow: hidden;
      background: #fff;
    }
    .label-card .lbl-company { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #111827; }
    .label-card .lbl-plant   { font-size: 13px; font-weight: 600; color: #111827; text-align: center; }
    .label-card .lbl-variety  { font-size: 11px; color: #4b5563; text-align: center; }
    .label-card .lbl-size     { font-size: 10px; font-weight: 500; color: #6b7280; }
    .label-card .lbl-price    { font-size: 16px; font-weight: 800; color: #166534; }
    .label-card .lbl-sku      { font-size: 9px; color: #9ca3af; font-family: monospace; }

    @media print {
      body * { visibility: hidden !important; }
      #print-sheet, #print-sheet * { visibility: visible !important; }
      #print-sheet {
        position: absolute; left: 0; top: 0; width: 100%;
        padding: 0.25in;
      }
      #print-sheet .label-card { border: 1px dashed #ccc; break-inside: avoid; }
    }
  </style>
  <script src="config.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.6/JsBarcode.all.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body class="h-full">
  <div class="min-h-full">
    <nav class="bg-white border-b border-gray-200 print:hidden">
      <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
        <div class="flex h-16 items-center justify-between">
          <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-brand-600 rounded-lg flex items-center justify-center">
              <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
            </div>
            <span class="text-lg font-bold text-gray-900">Michael's Nursery Pricing Hub</span>
          </div>
          <div class="flex gap-1">
            <a href="/" class="px-3 py-2 rounded-md text-sm font-medium text-gray-600 hover:bg-gray-100 hover:text-gray-900">Dashboard</a>
            <a href="/products.html" class="px-3 py-2 rounded-md text-sm font-medium text-gray-600 hover:bg-gray-100 hover:text-gray-900">Products</a>
            <a href="/pricing.html" class="px-3 py-2 rounded-md text-sm font-medium text-gray-600 hover:bg-gray-100 hover:text-gray-900">Bulk Pricing</a>
            <a href="/barcodes.html" class="px-3 py-2 rounded-md text-sm font-medium bg-brand-50 text-brand-700">Labels</a>
          </div>
        </div>
      </div>
    </nav>

    <main class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 py-8 print:hidden">
      <div x-data="labelBuilder()" x-init="init()" x-effect="refreshBarcodes()" class="fade-in">

        <div class="mb-8">
          <h1 class="text-2xl font-bold text-gray-900">Label Generator</h1>
          <p class="mt-1 text-sm text-gray-500">Create barcode labels with plant info, preview a sheet, then print or download.</p>
        </div>

        <div class="grid grid-cols-1 gap-8 lg:grid-cols-3">

          <!-- ============ LEFT: Label Content ============ -->
          <div class="lg:col-span-1 space-y-6">

            <!-- Product Picker -->
            <div class="rounded-xl border border-gray-200 bg-white p-5">
              <h2 class="mb-3 text-sm font-semibold text-gray-900 uppercase tracking-wider">Fill from product</h2>
              <div class="relative">
                <input
                  type="text"
                  x-model="productQuery"
                  @input.debounce.300ms="searchProducts()"
                  @focus="showDropdown = true"
                  placeholder="Search by name or SKU..."
                  class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-brand-500 focus:ring-brand-500"
                >
                <div x-show="loadingProducts" class="absolute right-3 top-2.5"><span class="spinner" style="width:16px;height:16px;border-width:2px;"></span></div>

                <!-- Dropdown -->
                <div x-show="showDropdown && filteredProducts.length > 0" x-cloak
                     @click.away="showDropdown = false"
                     class="absolute z-20 mt-1 w-full max-h-60 overflow-y-auto rounded-lg border border-gray-200 bg-white shadow-lg">
                  <template x-for="p in filteredProducts" :key="p.ItemId">
                    <button
                      type="button"
                      @click="fillFromProduct(p)"
                      class="block w-full text-left px-3 py-2 text-sm hover:bg-brand-50 transition border-b border-gray-100 last:border-0"
                    >
                      <span class="font-medium text-gray-900" x-text="p.Description"></span>
                      <span class="text-xs text-gray-500 ml-1" x-text="'(' + (p.SupplierSKU || '—') + ')'"></span>
                      <span class="block text-xs text-gray-400" x-text="(p.OpenSizeDescription || '') + (p.CatalogPrice > 0 ? '  •  $' + parseFloat(p.CatalogPrice).toFixed(2) : '')"></span>
                    </button>
                  </template>
                </div>
              </div>
              <p class="mt-1.5 text-xs text-gray-400">Or fill in the fields manually below.</p>
            </div>

            <!-- Label Fields -->
            <div class="rounded-xl border border-gray-200 bg-white p-5">
              <h2 class="mb-3 text-sm font-semibold text-gray-900 uppercase tracking-wider">Label content</h2>
              <div class="space-y-3">
                <div>
                  <label class="flex items-center justify-between">
                    <span class="text-sm font-medium text-gray-700">Company Name</span>
                    <input type="checkbox" x-model="show.company" class="rounded border-gray-300 text-brand-600 focus:ring-brand-500">
                  </label>
                  <input type="text" x-model="fields.company" placeholder="Michael's Wholesale Nursery"
                         class="mt-1 block w-full rounded-lg border border-gray-300 px-3 py-1.5 text-sm shadow-sm focus:border-brand-500 focus:ring-brand-500">
                </div>
                <div>
                  <label class="flex items-center justify-between">
                    <span class="text-sm font-medium text-gray-700">Plant Name</span>
                    <input type="checkbox" x-model="show.plant" class="rounded border-gray-300 text-brand-600 focus:ring-brand-500">
                  </label>
                  <input type="text" x-model="fields.plant" placeholder="Azalea"
                         class="mt-1 block w-full rounded-lg border border-gray-300 px-3 py-1.5 text-sm shadow-sm focus:border-brand-500 focus:ring-brand-500">
                </div>
                <div>
                  <label class="flex items-center justify-between">
                    <span class="text-sm font-medium text-gray-700">Variety</span>
                    <input type="checkbox" x-model="show.variety" class="rounded border-gray-300 text-brand-600 focus:ring-brand-500">
                  </label>
                  <input type="text" x-model="fields.variety" placeholder="Encore Royalty"
                         class="mt-1 block w-full rounded-lg border border-gray-300 px-3 py-1.5 text-sm shadow-sm focus:border-brand-500 focus:ring-brand-500">
                </div>
                <div class="grid grid-cols-2 gap-3">
                  <div>
                    <label class="flex items-center justify-between">
                      <span class="text-sm font-medium text-gray-700">Size</span>
                      <input type="checkbox" x-model="show.size" class="rounded border-gray-300 text-brand-600 focus:ring-brand-500">
                    </label>
                    <input type="text" x-model="fields.size" placeholder="3 Gal"
                           class="mt-1 block w-full rounded-lg border border-gray-300 px-3 py-1.5 text-sm shadow-sm focus:border-brand-500 focus:ring-brand-500">
                  </div>
                  <div>
                    <label class="flex items-center justify-between">
                      <span class="text-sm font-medium text-gray-700">Price</span>
                      <input type="checkbox" x-model="show.price" class="rounded border-gray-300 text-brand-600 focus:ring-brand-500">
                    </label>
                    <div class="mt-1 flex items-center">
                      <span class="text-sm text-gray-400 mr-1">$</span>
                      <input type="number" step="0.01" min="0" x-model.number="fields.price" placeholder="0.00"
                             class="block w-full rounded-lg border border-gray-300 px-3 py-1.5 text-sm shadow-sm focus:border-brand-500 focus:ring-brand-500">
                    </div>
                  </div>
                </div>
                <div>
                  <label class="flex items-center justify-between">
                    <span class="text-sm font-medium text-gray-700">SKU (barcode value)</span>
                    <input type="checkbox" x-model="show.sku" class="rounded border-gray-300 text-brand-600 focus:ring-brand-500">
                  </label>
                  <input type="text" x-model="fields.sku" placeholder="mnear3"
                         class="mt-1 block w-full rounded-lg border border-gray-300 px-3 py-1.5 text-sm shadow-sm focus:border-brand-500 focus:ring-brand-500">
                </div>
              </div>
            </div>

            <!-- Barcode & Sheet Options -->
            <div class="rounded-xl border border-gray-200 bg-white p-5">
              <h2 class="mb-3 text-sm font-semibold text-gray-900 uppercase tracking-wider">Options</h2>
              <div class="space-y-3">
                <div>
                  <label class="flex items-center justify-between">
                    <span class="text-sm font-medium text-gray-700">Show barcode</span>
                    <input type="checkbox" x-model="show.barcode" class="rounded border-gray-300 text-brand-600 focus:ring-brand-500">
                  </label>
                </div>
                <div>
                  <label class="text-sm font-medium text-gray-700">Barcode format</label>
                  <select x-model="barcodeFormat"
                          class="mt-1 block w-full rounded-lg border border-gray-300 px-3 py-1.5 text-sm shadow-sm focus:border-brand-500 focus:ring-brand-500">
                    <option value="CODE128">CODE128 (recommended)</option>
                    <option value="CODE39">CODE39</option>
                  </select>
                </div>
                <div class="grid grid-cols-2 gap-3">
                  <div>
                    <label class="text-sm font-medium text-gray-700">Columns</label>
                    <input type="number" min="1" max="6" x-model.number="sheetCols"
                           class="mt-1 block w-full rounded-lg border border-gray-300 px-3 py-1.5 text-sm shadow-sm focus:border-brand-500 focus:ring-brand-500">
                  </div>
                  <div>
                    <label class="text-sm font-medium text-gray-700">Rows</label>
                    <input type="number" min="1" max="15" x-model.number="sheetRows"
                           class="mt-1 block w-full rounded-lg border border-gray-300 px-3 py-1.5 text-sm shadow-sm focus:border-brand-500 focus:ring-brand-500">
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- ============ RIGHT: Preview ============ -->
          <div class="lg:col-span-2 space-y-6">

            <!-- Single Label Preview -->
            <div class="rounded-xl border border-gray-200 bg-white p-5">
              <h2 class="mb-3 text-sm font-semibold text-gray-900 uppercase tracking-wider">Label Preview</h2>
              <div class="flex items-center justify-center rounded-lg bg-gray-50 border border-gray-200 p-8">
                <div id="single-label-preview" class="label-card" style="width: 280px; min-height: 160px;">
                  <template x-if="show.company && fields.company">
                    <div class="lbl-company" x-text="fields.company"></div>
                  </template>
                  <template x-if="show.plant && fields.plant">
                    <div class="lbl-plant" x-text="fields.plant"></div>
                  </template>
                  <template x-if="show.variety && fields.variety">
                    <div class="lbl-variety" x-text="fields.variety"></div>
                  </template>
                  <template x-if="show.size && fields.size">
                    <div class="lbl-size" x-text="fields.size"></div>
                  </template>
                  <template x-if="show.price && fields.price > 0">
                    <div class="lbl-price" x-text="'$' + parseFloat(fields.price).toFixed(2)"></div>
                  </template>
                  <template x-if="show.barcode && fields.sku">
                    <div class="mt-1">
                      <canvas id="preview-barcode" width="200" height="50"></canvas>
                    </div>
                  </template>
                  <template x-if="show.sku && fields.sku && !show.barcode">
                    <div class="lbl-sku" x-text="fields.sku"></div>
                  </template>
                  <template x-if="!(fields.plant || fields.sku || fields.company)">
                    <p class="text-sm text-gray-400 py-6">Fill in the fields to see your label.</p>
                  </template>
                </div>
              </div>
            </div>

            <!-- Sheet Preview -->
            <div class="rounded-xl border border-gray-200 bg-white p-5">
              <div class="flex items-center justify-between mb-3">
                <h2 class="text-sm font-semibold text-gray-900 uppercase tracking-wider">
                  Sheet Preview
                  <span class="text-xs text-gray-400 font-normal normal-case ml-1" x-text="sheetCols + ' × ' + sheetRows + ' = ' + (sheetCols * sheetRows) + ' labels'"></span>
                </h2>
                <div class="flex gap-2">
                  <button @click="downloadSheet()" :disabled="!hasContent"
                          class="inline-flex items-center gap-1.5 rounded-lg bg-brand-600 px-3 py-1.5 text-xs font-semibold text-white shadow-sm transition hover:bg-brand-700 disabled:opacity-50 disabled:cursor-not-allowed">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                    Download PNG
                  </button>
                  <button @click="printSheet()" :disabled="!hasContent"
                          class="inline-flex items-center gap-1.5 rounded-lg border border-gray-300 bg-white px-3 py-1.5 text-xs font-semibold text-gray-700 shadow-sm transition hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg>
                    Print Sheet
                  </button>
                </div>
              </div>

              <div class="overflow-auto rounded-lg border border-gray-200 bg-gray-50 p-4" style="max-height: 600px;">
                <div id="sheet-container"
                     class="inline-grid gap-0 mx-auto"
                     :style="'grid-template-columns: repeat(' + sheetCols + ', 1fr)'">
                  <template x-for="i in (sheetCols * sheetRows)" :key="i">
                    <div class="label-card" style="width: 200px; min-height: 120px; font-size: 0.85em;">
                      <template x-if="show.company && fields.company">
                        <div class="lbl-company" x-text="fields.company"></div>
                      </template>
                      <template x-if="show.plant && fields.plant">
                        <div class="lbl-plant" x-text="fields.plant"></div>
                      </template>
                      <template x-if="show.variety && fields.variety">
                        <div class="lbl-variety" x-text="fields.variety"></div>
                      </template>
                      <template x-if="show.size && fields.size">
                        <div class="lbl-size" x-text="fields.size"></div>
                      </template>
                      <template x-if="show.price && fields.price > 0">
                        <div class="lbl-price" x-text="'$' + parseFloat(fields.price).toFixed(2)"></div>
                      </template>
                      <template x-if="show.barcode && fields.sku">
                        <div class="mt-0.5">
                          <canvas :id="'sheet-bc-' + i" width="160" height="40"></canvas>
                        </div>
                      </template>
                      <template x-if="show.sku && fields.sku && !show.barcode">
                        <div class="lbl-sku" x-text="fields.sku"></div>
                      </template>
                    </div>
                  </template>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Toast -->
        <div x-show="toast" x-transition x-cloak
             class="fixed top-4 right-4 z-50 flex items-center gap-2 rounded-lg px-4 py-3 text-sm font-medium shadow-lg"
             :class="toastType === 'success' ? 'bg-brand-600 text-white' : 'bg-red-600 text-white'">
          <span x-text="toast"></span>
        </div>
      </div>
    </main>

    <!-- Hidden print sheet -->
    <div id="print-sheet" class="hidden print:block">
      <!-- Cloned at print time -->
    </div>
  </div>

  <script>
  document.addEventListener('alpine:init', () => {
    Alpine.data('labelBuilder', () => ({
      fields: {
        company: "Michael's Wholesale Nursery",
        plant: '',
        variety: '',
        size: '',
        price: 0,
        sku: '',
      },
      show: {
        company: true,
        plant: true,
        variety: true,
        size: true,
        price: true,
        sku: true,
        barcode: true,
      },
      barcodeFormat: 'CODE128',
      sheetCols: 3,
      sheetRows: 5,

      productQuery: '',
      filteredProducts: [],
      loadingProducts: false,
      showDropdown: false,
      _allProducts: null,

      toast: '',
      toastType: 'success',

      get hasContent() {
        return !!(this.fields.plant || this.fields.sku || this.fields.company);
      },

      init() {
        this.prefetchProducts();
      },

      showToast(msg, type = 'success') {
        this.toast = msg;
        this.toastType = type;
        setTimeout(() => this.toast = '', 3000);
      },

      async prefetchProducts() {
        try {
          const data = await apiFetchJson('/api/products');
          this._allProducts = data.products || [];
        } catch { this._allProducts = []; }
      },

      searchProducts() {
        const q = (this.productQuery || '').trim().toLowerCase();
        if (!q) { this.filteredProducts = []; return; }
        if (!this._allProducts) { this.filteredProducts = []; return; }

        this.filteredProducts = this._allProducts.filter(p => {
          const desc = (p.Description || '').toLowerCase();
          const sku = (p.SupplierSKU || '').toLowerCase();
          return desc.includes(q) || sku.includes(q);
        }).slice(0, 30);

        this.showDropdown = true;
      },

      fillFromProduct(p) {
        const desc = p.Description || '';
        const parts = desc.split(' - ');
        const groupAndVariety = parts[0] || '';
        const sizeMatch = parts[1] ? parts[1].match(/\(([^)]+)\)/) : null;

        let plant = '';
        let variety = '';
        const pipeIdx = groupAndVariety.indexOf(' | ');
        if (pipeIdx >= 0) {
          variety = groupAndVariety.substring(0, pipeIdx).trim();
          plant = p.Comments || groupAndVariety.substring(pipeIdx + 3).trim();
        } else {
          const dashIdx = groupAndVariety.indexOf(' - ');
          if (dashIdx >= 0) {
            plant = groupAndVariety.substring(0, dashIdx).trim();
            variety = groupAndVariety.substring(dashIdx + 3).trim();
          } else {
            plant = p.Comments || groupAndVariety;
            variety = groupAndVariety !== plant ? groupAndVariety : '';
          }
        }

        this.fields.plant = plant || p.Comments || '';
        this.fields.variety = variety;
        this.fields.size = p.OpenSizeDescription || '';
        this.fields.price = parseFloat(p.CatalogPrice || 0);
        this.fields.sku = p.SupplierSKU || '';

        this.showDropdown = false;
        this.productQuery = desc;
      },

      refreshBarcodes() {
        this.$nextTick(() => {
          this.renderBarcode('preview-barcode');
          this.renderSheetBarcodes();
        });
      },

      renderBarcode(canvasId) {
        if (typeof JsBarcode !== 'function' || !this.show.barcode || !this.fields.sku) return;
        try {
          const el = document.getElementById(canvasId);
          if (!el) return;
          JsBarcode(el, this.fields.sku.trim(), {
            format: this.barcodeFormat,
            width: 1.5,
            height: 36,
            displayValue: this.show.sku,
            fontSize: 11,
            margin: 4,
          });
        } catch {}
      },

      renderSheetBarcodes() {
        if (typeof JsBarcode !== 'function' || !this.show.barcode || !this.fields.sku) return;
        const total = this.sheetCols * this.sheetRows;
        for (let i = 1; i <= total; i++) {
          try {
            const el = document.getElementById('sheet-bc-' + i);
            if (!el) continue;
            JsBarcode(el, this.fields.sku.trim(), {
              format: this.barcodeFormat,
              width: 1.2,
              height: 28,
              displayValue: this.show.sku,
              fontSize: 9,
              margin: 2,
            });
          } catch {}
        }
      },

      async downloadSheet() {
        const container = document.getElementById('sheet-container');
        if (!container) return;
        try {
          const canvas = await html2canvas(container, { backgroundColor: '#ffffff', scale: 2 });
          const link = document.createElement('a');
          const name = (this.fields.plant || this.fields.sku || 'labels').replace(/[^a-zA-Z0-9-_]/g, '_');
          link.download = 'labels-' + name + '.png';
          link.href = canvas.toDataURL('image/png');
          link.click();
          this.showToast('Sheet downloaded');
        } catch (e) {
          this.showToast('Download failed: ' + e.message, 'error');
        }
      },

      printSheet() {
        const container = document.getElementById('sheet-container');
        const printArea = document.getElementById('print-sheet');
        if (!container || !printArea) return;
        printArea.innerHTML = container.outerHTML;
        window.print();
      },
    }));
  });
  </script>
</body>
</html>
