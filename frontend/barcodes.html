<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barcode Generator - OrderEase Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50:'#f0fdf4', 100:'#dcfce7', 200:'#bbf7d0', 500:'#22c55e', 600:'#16a34a', 700:'#15803d', 800:'#166534' }
          }
        }
      }
    }
  </script>
  <style>
    [x-cloak] { display: none !important; }
    .fade-in { animation: fadeIn 0.2s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  </style>
  <script src="config.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.6/JsBarcode.all.min.js"></script>
</head>
<body class="h-full">
  <div class="min-h-full">
    <nav class="bg-white border-b border-gray-200">
      <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
        <div class="flex h-16 items-center justify-between">
          <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-brand-600 rounded-lg flex items-center justify-center">
              <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
            </div>
            <span class="text-lg font-bold text-gray-900">OrderEase Manager</span>
          </div>
          <div class="flex gap-1">
            <a href="/" class="px-3 py-2 rounded-md text-sm font-medium text-gray-600 hover:bg-gray-100 hover:text-gray-900">Dashboard</a>
            <a href="/products.html" class="px-3 py-2 rounded-md text-sm font-medium text-gray-600 hover:bg-gray-100 hover:text-gray-900">Products</a>
            <a href="/pricing.html" class="px-3 py-2 rounded-md text-sm font-medium text-gray-600 hover:bg-gray-100 hover:text-gray-900">Bulk Pricing</a>
            <a href="/barcodes.html" class="px-3 py-2 rounded-md text-sm font-medium bg-brand-50 text-brand-700">Barcodes</a>
          </div>
        </div>
      </div>
    </nav>

    <main class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 py-8">
      <div x-data="barcodeGenerator()" x-init="generate()" class="fade-in">
        <div class="mb-8">
          <h1 class="text-2xl font-bold text-gray-900">Barcode Generator</h1>
          <p class="mt-1 text-sm text-gray-500">Generate barcodes from SKU or text, then download or print.</p>
        </div>

        <div class="grid grid-cols-1 gap-8 lg:grid-cols-2">
          <div class="space-y-6">
            <div class="rounded-xl border border-gray-200 bg-white p-6">
              <h2 class="mb-4 text-base font-semibold text-gray-900">Content & format</h2>
              <div class="space-y-4">
                <div>
                  <label for="barcode-value" class="mb-1 block text-sm font-medium text-gray-700">Value (SKU or text)</label>
                  <input
                    id="barcode-value"
                    type="text"
                    x-model="value"
                    @input.debounce.200ms="generate()"
                    placeholder="e.g. PLANT-001 or 1234567890128"
                    class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-brand-500 focus:ring-brand-500"
                  >
                  <p class="mt-1 text-xs text-gray-500">Letters and numbers only for CODE128; numeric formats require the correct length.</p>
                </div>

                <div>
                  <label for="barcode-format" class="mb-1 block text-sm font-medium text-gray-700">Format</label>
                  <select
                    id="barcode-format"
                    x-model="format"
                    @change="generate()"
                    class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-brand-500 focus:ring-brand-500"
                  >
                    <option value="CODE128">CODE128 (recommended for SKUs)</option>
                    <option value="CODE39">CODE39</option>
                    <option value="EAN-13">EAN-13 (13 digits)</option>
                    <option value="EAN-8">EAN-8 (8 digits)</option>
                    <option value="UPC">UPC (12 digits)</option>
                  </select>
                </div>

                <div class="grid grid-cols-2 gap-4">
                  <div>
                    <label for="barcode-width" class="mb-1 block text-sm font-medium text-gray-700">Bar width</label>
                    <input
                      id="barcode-width"
                      type="number"
                      min="1"
                      max="5"
                      x-model.number="barWidth"
                      @input="generate()"
                      class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-brand-500 focus:ring-brand-500"
                    >
                  </div>
                  <div>
                    <label for="barcode-height" class="mb-1 block text-sm font-medium text-gray-700">Height (px)</label>
                    <input
                      id="barcode-height"
                      type="number"
                      min="30"
                      max="200"
                      x-model.number="height"
                      @input="generate()"
                      class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-brand-500 focus:ring-brand-500"
                    >
                  </div>
                </div>

                <label class="flex items-center">
                  <input
                    id="barcode-show-text"
                    type="checkbox"
                    x-model="displayValue"
                    @change="generate()"
                    class="rounded border-gray-300 text-brand-600 focus:ring-brand-500"
                  >
                  <span class="ml-2 text-sm text-gray-700">Show value below barcode</span>
                </label>
              </div>
            </div>
          </div>

          <div class="rounded-xl border border-gray-200 bg-white p-6">
            <h2 class="mb-4 text-base font-semibold text-gray-900">Preview</h2>
            <div class="mb-6 flex min-h-[200px] flex-col items-center justify-center rounded-lg border border-gray-200 bg-gray-50 p-6 print:border-0 print:bg-white">
              <template x-if="error">
                <p class="text-sm text-red-600" x-text="error"></p>
              </template>
              <template x-if="!error && value">
                <div class="flex flex-col items-center">
                  <canvas id="barcode-canvas" class="h-auto max-w-full"></canvas>
                </div>
              </template>
              <template x-if="!error && !value">
                <p class="text-sm text-gray-500">Enter a value to generate a barcode.</p>
              </template>
            </div>

            <div class="flex flex-wrap gap-3 print:hidden">
              <button
                type="button"
                @click="downloadPNG()"
                :disabled="!value || !!error"
                class="inline-flex items-center gap-2 rounded-lg bg-brand-600 px-4 py-2.5 text-sm font-semibold text-white shadow-sm transition hover:bg-brand-700 disabled:cursor-not-allowed disabled:opacity-50"
              >
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                Download PNG
              </button>
              <button
                type="button"
                @click="downloadSVG()"
                :disabled="!value || !!error"
                class="inline-flex items-center gap-2 rounded-lg border border-gray-300 bg-white px-4 py-2.5 text-sm font-semibold text-gray-900 shadow-sm transition hover:bg-gray-50 disabled:cursor-not-allowed disabled:opacity-50"
              >
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                Download SVG
              </button>
              <button
                type="button"
                @click="printBarcode()"
                :disabled="!value || !!error"
                class="inline-flex items-center gap-2 rounded-lg border border-gray-300 bg-white px-4 py-2.5 text-sm font-semibold text-gray-900 shadow-sm transition hover:bg-gray-50 disabled:cursor-not-allowed disabled:opacity-50"
              >
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg>
                Print
              </button>
            </div>

            <svg id="barcode-svg-export" class="hidden" xmlns="http://www.w3.org/2000/svg"></svg>
          </div>
        </div>

        <div id="print-area" class="hidden print:block print:p-8">
          <div class="flex flex-col items-center justify-center">
            <canvas id="barcode-print-canvas"></canvas>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
  document.addEventListener('alpine:init', () => {
    Alpine.data('barcodeGenerator', () => ({
      value: '',
      format: 'CODE128',
      barWidth: 2,
      height: 80,
      displayValue: true,
      error: '',

      generate() {
        this.error = '';
        const val = (this.value || '').trim();
        if (!val) return;

        this.$nextTick(() => {
          try {
            const canvas = document.getElementById('barcode-canvas');
            if (!canvas) return;

            JsBarcode(canvas, val, {
              format: this.format,
              width: this.barWidth,
              height: this.height,
              displayValue: this.displayValue,
              margin: 10
            });
          } catch (e) {
            this.error = e.message || 'Invalid value for this barcode format';
          }
        });
      },

      downloadPNG() {
        const canvas = document.getElementById('barcode-canvas');
        if (!canvas || !this.value || this.error) return;

        const link = document.createElement('a');
        link.download = 'barcode-' + (this.value || 'barcode').replace(/[^a-zA-Z0-9-_]/g, '_') + '.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      },

      downloadSVG() {
        if (!this.value || this.error) return;

        const svg = document.getElementById('barcode-svg-export');
        if (!svg) return;

        try {
          JsBarcode(svg, this.value.trim(), {
            format: this.format,
            width: this.barWidth,
            height: this.height,
            displayValue: this.displayValue,
            margin: 10
          });

          const xml = new XMLSerializer().serializeToString(svg);
          const blob = new Blob([xml], { type: 'image/svg+xml' });
          const url = URL.createObjectURL(blob);
          const link = document.createElement('a');
          link.download = 'barcode-' + (this.value || 'barcode').replace(/[^a-zA-Z0-9-_]/g, '_') + '.svg';
          link.href = url;
          link.click();
          URL.revokeObjectURL(url);
        } catch (e) {
          this.error = e.message || 'Failed to generate SVG';
        }
      },

      printBarcode() {
        if (!this.value || this.error) return;

        const sourceCanvas = document.getElementById('barcode-canvas');
        const printCanvas = document.getElementById('barcode-print-canvas');
        if (!sourceCanvas || !printCanvas) return;

        printCanvas.width = sourceCanvas.width;
        printCanvas.height = sourceCanvas.height;
        const ctx = printCanvas.getContext('2d');
        ctx.drawImage(sourceCanvas, 0, 0);
        window.print();
      }
    }));
  });
  </script>
  <style>
    @media print {
      body * { visibility: hidden; }
      #print-area, #print-area * { visibility: visible; }
      #print-area { position: absolute; left: 0; top: 0; width: 100%; }
    }
  </style>
</body>
</html>
