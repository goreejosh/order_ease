<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - OrderEase Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50:'#f0fdf4', 100:'#dcfce7', 200:'#bbf7d0', 500:'#22c55e', 600:'#16a34a', 700:'#15803d', 800:'#166534' }
          }
        }
      }
    }
  </script>
  <style>
    [x-cloak] { display: none !important; }
    .fade-in { animation: fadeIn 0.2s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .spinner { border: 3px solid #e5e7eb; border-top-color: #22c55e; border-radius: 50%; width: 20px; height: 20px; animation: spin 0.6s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <script src="config.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="h-full">
  <div class="min-h-full">
    <!-- Nav -->
    <nav class="bg-white border-b border-gray-200">
      <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
        <div class="flex h-16 items-center justify-between">
          <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-brand-600 rounded-lg flex items-center justify-center">
              <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
            </div>
            <span class="text-lg font-bold text-gray-900">OrderEase Manager</span>
          </div>
          <div class="flex gap-1">
            <a href="/" class="px-3 py-2 rounded-md text-sm font-medium bg-brand-50 text-brand-700">Dashboard</a>
            <a href="/products.html" class="px-3 py-2 rounded-md text-sm font-medium text-gray-600 hover:bg-gray-100 hover:text-gray-900">Products</a>
            <a href="/pricing.html" class="px-3 py-2 rounded-md text-sm font-medium text-gray-600 hover:bg-gray-100 hover:text-gray-900">Bulk Pricing</a>
            <a href="/barcodes.html" class="px-3 py-2 rounded-md text-sm font-medium text-gray-600 hover:bg-gray-100 hover:text-gray-900">Barcodes</a>
          </div>
        </div>
      </div>
    </nav>

    <!-- Content -->
    <main class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 py-8">
      <div x-data="dashboardData()" x-init="loadStats()" class="fade-in">
        <div class="mb-8">
          <h1 class="text-2xl font-bold text-gray-900">Dashboard</h1>
          <p class="mt-1 text-sm text-gray-500">Product catalog overview</p>
        </div>

        <!-- Loading state -->
        <div x-show="loading" class="flex items-center justify-center py-20">
          <div class="text-center">
            <span class="spinner"></span>
            <p class="mt-3 text-sm text-gray-500">Loading stats...</p>
          </div>
        </div>

        <div x-show="!loading" x-cloak>
          <!-- Stat cards -->
          <div class="grid grid-cols-1 gap-5 sm:grid-cols-3 mb-10">
            <div class="bg-white overflow-hidden rounded-xl border border-gray-200 px-6 py-5">
              <dt class="truncate text-sm font-medium text-gray-500">Total Products</dt>
              <dd class="mt-1 text-3xl font-bold tracking-tight text-gray-900" x-text="stats.total"></dd>
            </div>
            <div class="bg-white overflow-hidden rounded-xl border border-gray-200 px-6 py-5">
              <dt class="truncate text-sm font-medium text-gray-500">Priced</dt>
              <dd class="mt-1 text-3xl font-bold tracking-tight text-brand-600" x-text="stats.priced"></dd>
            </div>
            <div class="bg-white overflow-hidden rounded-xl border border-gray-200 px-6 py-5">
              <dt class="truncate text-sm font-medium text-gray-500">Unpriced</dt>
              <dd class="mt-1 text-3xl font-bold tracking-tight"
                  :class="stats.unpriced > 0 ? 'text-amber-600' : 'text-gray-400'"
                  x-text="stats.unpriced"></dd>
            </div>
          </div>

          <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- By Size -->
            <div class="bg-white rounded-xl border border-gray-200 p-6">
              <h2 class="text-base font-semibold text-gray-900 mb-4">Products by Size</h2>
              <div class="space-y-3">
                <template x-for="[name, count] in Object.entries(stats.sizes || {})" :key="name">
                  <div class="flex items-center justify-between">
                    <span class="text-sm text-gray-700" x-text="name"></span>
                    <div class="flex items-center gap-3">
                      <div class="w-32 bg-gray-100 rounded-full h-2">
                        <div class="bg-brand-500 h-2 rounded-full" :style="'width:' + Math.round(count / stats.total * 100) + '%'"></div>
                      </div>
                      <span class="text-sm font-medium text-gray-900 w-10 text-right" x-text="count"></span>
                    </div>
                  </div>
                </template>
              </div>
            </div>

            <!-- By Group -->
            <div class="bg-white rounded-xl border border-gray-200 p-6">
              <h2 class="text-base font-semibold text-gray-900 mb-4">Products by Group</h2>
              <div class="space-y-3 max-h-80 overflow-y-auto">
                <template x-for="[name, count] in Object.entries(stats.groups || {})" :key="name">
                  <div class="flex items-center justify-between">
                    <a :href="'/products.html?group=' + encodeURIComponent(name)" class="text-sm text-brand-700 hover:underline" x-text="name"></a>
                    <span class="text-sm font-medium text-gray-900" x-text="count"></span>
                  </div>
                </template>
              </div>
            </div>
          </div>

          <!-- Quick actions -->
          <div class="mt-10 flex gap-4">
            <a href="/products.html" class="inline-flex items-center gap-2 rounded-lg bg-brand-600 px-4 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-brand-700 transition">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
              Browse Products
            </a>
            <a href="/pricing.html" class="inline-flex items-center gap-2 rounded-lg bg-white px-4 py-2.5 text-sm font-semibold text-gray-900 shadow-sm border border-gray-300 hover:bg-gray-50 transition">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1"/></svg>
              Bulk Price Update
            </a>
            <a href="/barcodes.html" class="inline-flex items-center gap-2 rounded-lg bg-white px-4 py-2.5 text-sm font-semibold text-gray-900 shadow-sm border border-gray-300 hover:bg-gray-50 transition">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7h1m3 0h1m3 0h4M4 17h1m3 0h1m3 0h4M4 12h16"/></svg>
              Barcode Generator
            </a>
          </div>
        </div>

        <!-- Error -->
        <div x-show="error" x-cloak class="rounded-lg bg-red-50 border border-red-200 p-4 mt-4">
          <p class="text-sm text-red-700" x-text="error"></p>
        </div>
      </div>
    </main>
  </div>

  <script>
  function dashboardData() {
    return {
      loading: true,
      error: '',
      stats: { total: 0, priced: 0, unpriced: 0, sizes: {}, groups: {} },
      async loadStats() {
        try {
          this.stats = await apiFetchJson('/api/stats');
        } catch (e) {
          this.error = e.message;
        } finally {
          this.loading = false;
        }
      }
    };
  }
  </script>
</body>
</html>
